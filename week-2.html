<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML & CSS Web Page</title>
    <link rel="stylesheet" href="week-2.css">
</head>
<body>
   <h1 style="text-align: center;">Html page with style</h1>
   </div>
   <div class="enquiry">
     <form action="button" style="align-items: start;">
        <fieldset style="width: min-content;">
            <legend>Enquiry Form</legend>
        <label for="name">Name</label>
        <input type="name" required placeholder="Enter Your Name">
        <br>
        <br>
        <label for="mail">Mail</label>
        <input type="mail" required placeholder="Enter your mail id">
        <br>
        <br>
        <label for="phone">Phone</label>
        <input type="number" required placeholder="Enter your mobile number">
        <br><br>
        <label for="address" style="text-align: center;">Enter Your address</label>
        <textarea id="address" name="address" rows="5" cols="40" placeholder="Please Enter Your Address"></textarea>
        <br>
        <br>
        <button style="align-items: center;">Submit</button>
        <input type="reset" value="Clear Entries">
        </fieldset>
    </form>
   </div>

</body>
</html>
