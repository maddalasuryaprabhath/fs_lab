<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 style="text-align: center;">Static HTML Web Page</h1>
    <section>
        <header>Lorem ipsum dolor sit amet.</header>
        <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Illum voluptas non sequi animi repellat commodi quaerat quod deserunt officiis alias!</p>
        <footer>Lorem ipsum dolor sit amet.</footer>
    </section>
    <br>
    <a href="google.com">click here</a>
    <br>
    <br>
    <section>
        <form action="button" style="align-items: start;">
        <fieldset style="width: min-content;">
            <legend>Enquiry Form</legend>
        <label for="name">Name</label>
        <input type="name" required placeholder="Enter Your Name">
        <br>
        <br>
        <label for="mail">Mail</label>
        <input type="mail" required placeholder="Enter your mail id">
        <br>
        <br>
        <label for="phone">Phone</label>
        <input type="number" required placeholder="Enter your mobile number">
        <br><br>
        <label for="address" style="text-align: center;">Enter Your address</label>
        <textarea id="address" name="address" rows="5" cols="40" placeholder="Please Enter Your Address"></textarea>
        <br>
        <br>
        <button style="align-items: center;">Submit</button>
        <input type="reset" value="Clear Entries">
        </fieldset>
    </form>
    </section>
</body>
</html>
